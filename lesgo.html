<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Azkiya Aisyah</title>

    <style>
        /*GLOBAL STYLE*/
        body {
            font-family: 'Impact', sans-serif;
            background-color: #466b7e;
            margin: 0;

        }

        /* Smooth scroll saat klik navbar */
        html {
            scroll-behavior: smooth;
        }

        /*NAVBAR*/
        nav {
            position: fixed;
            /* biar selalu di atas */
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
        }

        /* efek saat di-hover */
        nav a {
            color: #dfd5b1;
            text-decoration: none;
            padding: 18px 22px;
            position: relative;
        }

        /* animasi garis bawah */
        nav a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            background: #f4d03f;
            left: 0;
            bottom: 5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /*CONTAINER*/
        .container {
            max-width: 900px;
            margin: auto;
            padding-top: 80px;
            /* biar gak ketutup navbar */
        }

        /*SECTION (KOTAK KONTEN)*/
        .section {
            background: #f4d03f;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }


        section {
            scroll-margin-top: 80px;
        }

        /*TEXT*/
        h1 {
            text-align: center;
            color: antiquewhite;
            size: 70px;
        }

        h2 {
            color: #2c3e50;
        }

        h3 {
            text-align: center;
            size: 30px;
            color: antiquewhite;
        }

        /*MEDIA*/
        video,
        audio {
            width: 100%;
            margin-top: 10px;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        embed {
            width: 100%;
            height: 500px;
        }
    </style>
</head>

<body>

    <!-- =====================
     NAVBAR
===================== -->
    <nav>
        <!-- href = tujuan scroll -->
        <a href="#perkenalan">Video Perkenalan</a>
        <a href="#audio">Backsound</a>
        <a href="#youtube">Minat saya</a>
        <a href="#cv">Curriculum Vitae</a>
    </nav>

    <div class="container">

        <h1>Portofolio Pribadi</h1>
        <h3>
            <p align="center">Azkiya Aisyah - STr Teknologi Rekayasa Multimedia B</p>
        </h3>

        <!-- =====================
     VIDEO PERKENALAN
===================== -->
        <section id="perkenalan" class="section">

            <h2>Video Perkenalan</h2>

            <!-- video -->
            <video controls>
                <source src="perkenalan.mp4" type="video/mp4">
                Browser tidak mendukung video
            </video>

        </section>

        <!-- =====================
     AUDIO
===================== -->
        <section id="audio" class="section">

            <h2>Backsound</h2>

            <audio controls>
                <source src="audioku.mp3" type="audio/mpeg">
            </audio>

        </section>

        <!-- =====================
     YOUTUBE
===================== -->
        <section id="youtube" class="section">

            <h2>Video YouTube</h2>

            <!-- embed youtube (harus format /embed/) -->
            <iframe src="https://www.youtube.com/embed/peOxaBjSVCE?si=T_T3MhQUo147sHtT" allowfullscreen>
            </iframe>

        </section>

        <!-- =====================
     PDF / CV
===================== -->
        <section id="cv" class="section">

            <h2>Curriculum Vitae</h2>

            <!-- file pdf lokal -->
            <embed src="cvku.pdf" type="application/pdf">


        </section>

    </div>

</body>

</html>
